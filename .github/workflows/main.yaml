name: Build WF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: build
        run: mvn install
      - name: uploading the artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: target/*.war

  Testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: test
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle