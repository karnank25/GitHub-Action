name: Build WF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: build
        run: mvn install

  Testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: test
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle